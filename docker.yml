version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: distributionbox-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Xjy12345@@
      MYSQL_DATABASE: distributionbox
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/2.22.sql:/docker-entrypoint-initdb.d/2.22.sql:ro

  redis:
    image: redis:7
    container_name: distributionbox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    image: python:3.11
    container_name: distributionbox-backend
    restart: unless-stopped
    working_dir: /app
    command: bash -lc "chmod +x ./run.sh && ./run.sh"
    volumes:
      - ./:/app
      - ./files:/app/files
    ports:
      - "8888:8888"
    depends_on:
      - mysql
      - redis

  frontend:
    image: node:20
    container_name: distributionbox-frontend
    restart: unless-stopped
    working_dir: /app/frontend
    command: bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    volumes:
      - ./:/app
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  db_data:
