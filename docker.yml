services:
  mysql:
    image: mysql:8.0
    container_name: distributionbox-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Xjy12345@@
      MYSQL_DATABASE: distributionbox
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/2.22.sql:/docker-entrypoint-initdb.d/2.22.sql:ro

  redis:
    image: redis:7
    container_name: distributionbox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: distributionbox-backend
    restart: unless-stopped
    working_dir: /app/backend
    command: bash -lc "mvn spring-boot:run -Dspring-boot.run.arguments=--server.port=8888"
    volumes:
      - ./:/app
      - ./files:/app/files
      - ~/.m2:/root/.m2
    ports:
      - "8888:8888"
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/distributionbox?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Xjy12345@@
    depends_on:
      - mysql
      - redis

  frontend:
    image: node:20
    container_name: distributionbox-frontend
    restart: unless-stopped
    working_dir: /app/frontend
    command: bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    volumes:
      - ./:/app
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  db_data:
